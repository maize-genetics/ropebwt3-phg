<svg width="680" viewBox="0 0 680 322" role="img" xmlns="http://www.w3.org/2000/svg">
<title>How refmap places a query that is absent from the reference</title>
<desc>A query inside a carrier-only insertion is located in the carriers, then refmap walks outward through the carrier to the insertion breakpoints and re-anchors the shared flanks onto the reference, placing the query at reference coordinate 300.</desc>
<defs>
<marker id="ag" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 2 L8 5 L2 8 Z" fill="#888780"/></marker>
<marker id="at" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M2 2 L8 5 L2 8 Z" fill="#1D9E75"/></marker>
</defs>
<g font-family="-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif">

<rect x="60" y="14" width="14" height="14" rx="3" fill="#E1F5EE" stroke="#0F6E56"/>
<text x="80" y="25" font-size="12" fill="#5F5E5A">shared flanks (A, B)</text>
<rect x="280" y="14" width="14" height="14" rx="3" fill="#FAECE7" stroke="#993C1D"/>
<text x="300" y="25" font-size="12" fill="#5F5E5A">insertion (carrier only)</text>
<rect x="540" y="14" width="14" height="14" rx="3" fill="#F1EFE8" stroke="#888780"/>
<text x="560" y="25" font-size="12" fill="#5F5E5A">query</text>

<text x="60" y="52" font-size="14" font-weight="500" fill="#2C2C2A">carrier genome — A + insertion + B</text>
<line x1="190" y1="58" x2="190" y2="120" stroke="#B4B2A9" stroke-dasharray="3 3"/>
<line x1="490" y1="58" x2="490" y2="120" stroke="#B4B2A9" stroke-dasharray="3 3"/>
<rect x="60" y="64" width="130" height="36" fill="#E1F5EE" stroke="#0F6E56"/>
<text x="125" y="86" font-size="14" fill="#085041" text-anchor="middle">A</text>
<rect x="190" y="64" width="300" height="36" fill="#FAECE7" stroke="#993C1D"/>
<text x="250" y="86" font-size="14" fill="#712B13" text-anchor="middle">insertion</text>
<rect x="490" y="64" width="130" height="36" fill="#E1F5EE" stroke="#0F6E56"/>
<text x="555" y="86" font-size="14" fill="#085041" text-anchor="middle">B</text>
<rect x="320" y="60" width="80" height="44" rx="4" fill="#F1EFE8" stroke="#444441"/>
<text x="360" y="86" font-size="14" fill="#2C2C2A" text-anchor="middle">query</text>

<line x1="320" y1="120" x2="196" y2="120" stroke="#888780" stroke-width="1.5" marker-end="url(#ag)"/>
<line x1="400" y1="120" x2="484" y2="120" stroke="#888780" stroke-width="1.5" marker-end="url(#ag)"/>
<text x="340" y="137" font-size="12" fill="#5F5E5A" text-anchor="middle">walk outward to the breakpoints</text>

<path d="M175 104 L336 222" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#at)"/>
<path d="M505 104 L344 222" fill="none" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#at)"/>
<text x="340" y="162" font-size="12" fill="#5F5E5A" text-anchor="middle">anchor flanks in reference</text>

<text x="60" y="210" font-size="14" font-weight="500" fill="#2C2C2A">reference genome (B73) — A + B</text>
<rect x="220" y="222" width="120" height="36" fill="#E1F5EE" stroke="#0F6E56"/>
<text x="280" y="244" font-size="14" fill="#085041" text-anchor="middle">A</text>
<rect x="340" y="222" width="120" height="36" fill="#E1F5EE" stroke="#0F6E56"/>
<text x="400" y="244" font-size="14" fill="#085041" text-anchor="middle">B</text>
<line x1="340" y1="216" x2="340" y2="264" stroke="#B4B2A9" stroke-dasharray="3 3"/>
<text x="340" y="280" font-size="12" fill="#5F5E5A" text-anchor="middle">cL = cR = 300</text>
<text x="340" y="300" font-size="12" fill="#5F5E5A" text-anchor="middle">query placed at B73_chr1:300 · insertion 500 bp</text>
</g>
</svg>
